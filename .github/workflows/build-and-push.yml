name: Build and push images

# Manual trigger for now — once the Azure deploy stabilises, this can also
# fire on push to `main` so merging a release auto-publishes images.
#
# Why this workflow exists: image publishing belongs in the deployment
# pipeline, not on a laptop. Running it in CI gives us a clear audit trail
# (every image version pegged to a workflow run + commit SHA) and a
# repeatable build environment that doesn't depend on whose machine pressed
# enter.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push (default: latest)
        required: false
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      IMAGE_REGISTRY: ghcr.io/aet-devops26/team-chaos-monkeys
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      # The Azure VM is x86_64; pin to amd64 so a future arm64 runner can't
      # produce images that bomb with "exec format error" on pull.
      DOCKER_DEFAULT_PLATFORM: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            build

      - name: Push images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            push

      - name: Summarise
        run: |
          echo "Pushed to: $IMAGE_REGISTRY/* :$IMAGE_TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "View: https://github.com/AET-DevOps26/team-chaos-monkeys/pkgs/container" >> "$GITHUB_STEP_SUMMARY"
