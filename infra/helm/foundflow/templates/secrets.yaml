{{/*
foundflow-app-secrets holds non-DB application secrets (OpenAI key, dev admin
bootstrap credentials, JWT signing key). Only keys with non-empty values are
emitted, so consumers must mark their secretKeyRef as optional: true when the
secret may be missing.

Real values are injected at install time:
  helm upgrade --install foundflow ./infra/helm/foundflow \
    --set secrets.openaiApiKey=$OPENAI_API_KEY \
    --set secrets.devAdminEmail=$DEV_ADMIN_EMAIL ...

The Bitnami Postgres subcharts manage their own Secrets (one per DB release),
auto-generated on first install. Do not template those here.
*/}}
{{- $hasAny := false -}}
{{- range $k, $v := .Values.secrets }}{{- if $v }}{{- $hasAny = true }}{{- end }}{{- end }}
{{- if $hasAny }}
apiVersion: v1
kind: Secret
metadata:
  name: foundflow-app-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
