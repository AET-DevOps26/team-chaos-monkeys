spring.application.name=operations-service
server.port=${SERVER_PORT:8086}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info
# Export http.server.requests as a histogram so Grafana can compute p95 latency.
management.metrics.distribution.percentiles-histogram.http.server.requests=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}

# AMQP trace propagation (issue #280): observations put the W3C traceparent
# on message headers, linking publisher and consumer spans across the broker.
spring.rabbitmq.template.observation-enabled=true

# The OTel starter puts micrometer-registry-otlp on the classpath, which
# defaults to pushing metrics to localhost:4318 and WARN-logging the failure.
# Metrics are Prometheus-scraped here; OTLP is traces-only (issue #281).
management.otlp.metrics.export.enabled=false
