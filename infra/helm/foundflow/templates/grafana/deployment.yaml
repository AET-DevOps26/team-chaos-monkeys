{{/*
Our own Grafana pod, kept in-namespace so dashboards ship with the chart
(kube-prometheus-stack's Grafana is disabled). Login via foundflow-grafana
Secret; provisioning ConfigMaps mounted read-only.
*/}}
{{- if .Values.grafana.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  # Recreate, not RollingUpdate: a surge pod would briefly double this
  # Deployment's footprint and can tip the tight AET namespace quota
  # (4 CPU / 6Gi) into rejecting pods during a deploy. See deployments.yaml.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "foundflow.labels" . | nindent 8 }}
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: grafana
      annotations:
        # Re-roll the pod when the dashboards ConfigMap changes.
        checksum/dashboards: {{ include (print $.Template.BasePath "/grafana/configmaps.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: foundflow-grafana
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foundflow-grafana
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            {{- if .Values.grafana.ingressPath }}
            - name: GF_SERVER_ROOT_URL
              value: {{ printf "http%s://%s%s/" (ternary "s" "" .Values.ingress.tls.enabled) .Values.ingress.host .Values.grafana.ingressPath | quote }}
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-files
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
          {{- with .Values.grafana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: storage
          emptyDir: {}
        - name: provisioning-datasources
          configMap:
            name: foundflow-grafana-provisioning
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: provisioning-dashboards
          configMap:
            name: foundflow-grafana-provisioning
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboard-files
          configMap:
            name: foundflow-grafana-dashboards
{{- end }}
