spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info
# Export http.server.requests as a histogram so Grafana can compute p95 latency.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
foundflow.auth.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
foundflow.auth.rsa-private-key=${JWT_RSA_PRIVATE_KEY:}
foundflow.auth.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:30}
foundflow.auth.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
foundflow.auth.password-reset-token-minutes=${PASSWORD_RESET_TOKEN_MINUTES:30}
foundflow.public.base-url=${PUBLIC_BASE_URL:http://localhost:3000}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
