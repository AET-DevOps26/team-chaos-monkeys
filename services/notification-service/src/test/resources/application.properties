spring.datasource.url=jdbc:h2:mem:notification_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.sql.init.mode=never

spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

foundflow.public.base-url=http://localhost:8080
foundflow.magic-link.secret=foundflow-test-magic-link-secret
foundflow.magic-link.ttl-days=7
foundflow.notifications.from-address=no-reply@foundflow.test

spring.mail.host=localhost
spring.mail.port=2525