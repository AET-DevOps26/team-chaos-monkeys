services:
  auth-service:
    build:
      context: ./services/auth-service
    container_name: foundflow-auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081

  lost-item-service:
    build:
      context: ./services/lost-item-service
    container_name: foundflow-lost-item-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082

  found-item-service:
    build:
      context: ./services/found-item-service
    container_name: foundflow-found-item-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083

  matching-service:
    build:
      context: ./services/matching-service
    container_name: foundflow-matching-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084

  notification-service:
    build:
      context: ./services/notification-service
    container_name: foundflow-notification-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085

  operations-service:
    build:
      context: ./services/operations-service
    container_name: foundflow-operations-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086

  ollama:
    image: ollama/ollama:0.4.2
    container_name: foundflow-ollama
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  # One-shot sidecar: pulls the configured chat + embed models on startup,
  # then exits 0. genai-service waits for it via service_completed_successfully
  # so a fresh `docker compose up` is guaranteed to find the models present.
  # Pulled models are cached in the ollama-models volume across runs.
  ollama-init:
    image: ollama/ollama:0.4.2
    container_name: foundflow-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint:
      - sh
      - -c
      - 'ollama pull "$$OLLAMA_CHAT_MODEL" && ollama pull "$$OLLAMA_EMBED_MODEL"'
    restart: "no"

  genai-service:
    build:
      context: ./services/genai-service
    container_name: foundflow-genai-service
    ports:
      - "8000:8000"
    environment:
      GENAI_PROVIDER: ${GENAI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      GENAI_TIMEOUT_SECONDS: ${GENAI_TIMEOUT_SECONDS:-30}
    depends_on:
      ollama-init:
        condition: service_completed_successfully

  client:
    build:
      context: ./client
    container_name: foundflow-client
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - lost-item-service
      - found-item-service
      - matching-service
      - notification-service
      - operations-service

volumes:
  ollama-models: