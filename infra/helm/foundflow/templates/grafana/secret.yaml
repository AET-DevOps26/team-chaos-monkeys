{{/*
Grafana admin login. User is `admin`; password from grafana.adminPassword,
or `admin` if empty.
*/}}
{{- if .Values.grafana.enabled -}}
{{- $pwd := default "admin" .Values.grafana.adminPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: foundflow-grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
type: Opaque
stringData:
  admin-user: {{ .Values.grafana.adminUser | quote }}
  admin-password: {{ $pwd | quote }}
{{- end }}
