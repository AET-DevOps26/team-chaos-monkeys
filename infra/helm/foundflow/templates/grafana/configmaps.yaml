{{/*
Provisioning for Grafana:
  - provisioning CM: Prometheus datasource (pinned `uid: prometheus`) +
    dashboard provider config.
  - dashboards CM: dashboard JSON read from the chart's dashboards/ folder
    (symlinked to infra/grafana/dashboards/ so compose and Helm match).
*/}}
{{- if .Values.grafana.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: foundflow-grafana-provisioning
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: {{ .Values.grafana.prometheusUrl | quote }}
        isDefault: true
        editable: false
      {{- if .Values.loki.enabled }}
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
        {{- if .Values.tempo.enabled }}
        # logs → trace (issue #281): every service logs a top-level "traceId"
        # JSON key (Spring MDC passthrough / genai EcsJsonFormatter).
        jsonData:
          derivedFields:
            - name: traceId
              matcherRegex: '"traceId":"(\w+)"'
              datasourceUid: tempo
              url: '$${__value.raw}'
        {{- end }}
      {{- end }}
      {{- if .Values.tempo.enabled }}
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        editable: false
        {{- if .Values.loki.enabled }}
        # trace → logs (issue #281): span's service.name maps onto the
        # `service` stream label Alloy attaches; window padded ±5m.
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-5m'
            spanEndTimeShift: '5m'
            filterByTraceID: true
            tags:
              - key: 'service.name'
                value: 'service'
        {{- end }}
      {{- end }}
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: foundflow
        orgId: 1
        folder: FoundFlow
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: foundflow-grafana-dashboards
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
