spring.application.name=matching-service
server.port=${SERVER_PORT:8084}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}

foundflow.internal.token=${INTERNAL_SERVICE_TOKEN}

genai.base-url=${GENAI_BASE_URL:http://genai-service:8000}
genai.connect-timeout=${GENAI_CONNECT_TIMEOUT:PT2S}
genai.read-timeout=${GENAI_READ_TIMEOUT:PT15S}
genai.api-key=${GENAI_API_KEY:}
genai.enabled=${GENAI_ENABLED:true}

# Match-candidate thresholds. Tuned at zero observations; the matching.score.combined
# histogram exposes the distribution post-deploy so they can be re-tuned in env.
foundflow.matching.top-k=${MATCHING_TOP_K:20}
foundflow.matching.threshold=${MATCHING_THRESHOLD:0.55}
# Soft category prior: factor applied to the semantic score when the two items'
# categories don't agree (vs 1.0 when they do). <1.0 penalises but does not veto,
# so a strong embedding match survives a category misclassification.
foundflow.matching.category-mismatch-factor=${MATCHING_CATEGORY_MISMATCH_FACTOR:0.85}
foundflow.matching.auto-invite-threshold=${MATCHING_AUTO_INVITE_THRESHOLD:0.85}
foundflow.matching.republish-score-delta=${MATCHING_REPUBLISH_SCORE_DELTA:0.01}

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=${RABBITMQ_LISTENER_RETRY_MAX_ATTEMPTS:3}
spring.rabbitmq.listener.simple.retry.initial-interval=${RABBITMQ_LISTENER_RETRY_INITIAL_INTERVAL:1s}
spring.rabbitmq.listener.simple.retry.multiplier=${RABBITMQ_LISTENER_RETRY_MULTIPLIER:2}
spring.rabbitmq.listener.simple.retry.max-interval=${RABBITMQ_LISTENER_RETRY_MAX_INTERVAL:10s}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Embedding dim — single operator knob, drives:
#  - the item_embeddings.embedding column type (Flyway placeholder below)
#  - the startup probe of genai-service /_diagnostic
#  - the per-ingest length assertion in CandidateMatchingService
# Must match what genai-service is configured to produce (EMBEDDING_DIMENSIONS on its side).
foundflow.matching.embedding-dim=${EMBEDDING_DIMENSIONS:768}
spring.flyway.placeholders.embedding_dim=${EMBEDDING_DIMENSIONS:768}

foundflow.public.base-url=${PUBLIC_BASE_URL:http://localhost:3000}
foundflow.magic-link.secret=${MAGIC_LINK_SECRET:foundflow-local-dev-magic-link-secret-change-me}
foundflow.magic-link.ttl-days=${MAGIC_LINK_TTL_DAYS:7}

# verify-match (issue #151)
genai.verify.enabled=${GENAI_VERIFY_ENABLED:true}
genai.verify.executor.core-pool-size=${GENAI_VERIFY_CORE_POOL:2}
genai.verify.executor.max-pool-size=${GENAI_VERIFY_MAX_POOL:8}
genai.verify.executor.queue-capacity=${GENAI_VERIFY_QUEUE:200}

# staff free-text item search / RAG (issue #179)
# enabled=false sheds load on the genai /answer call: retrieval still runs, the endpoint degrades
# to raw kNN results (answer:null). default-k is used when the request omits k; max-k caps it
# (and the genai /answer snippet limit is 32).
genai.search.enabled=${GENAI_SEARCH_ENABLED:true}
genai.search.default-k=${GENAI_SEARCH_DEFAULT_K:5}
genai.search.max-k=${GENAI_SEARCH_MAX_K:32}
