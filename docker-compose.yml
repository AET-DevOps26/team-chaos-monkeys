services:
  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: foundflow-gateway-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      - auth-service
      - lost-item-service
      - found-item-service
      - matching-service
      - notification-service
      - pickup-service
      - operations-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: foundflow-auth-service
    environment:
      SERVER_PORT: 8081
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME:?AUTH_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:?AUTH_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
      SPRING_PROFILES_ACTIVE: dev
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:?DEV_ADMIN_EMAIL is required}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:?DEV_ADMIN_PASSWORD is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-30}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  lost-item-service:
    build:
      context: .
      dockerfile: ./services/lost-item-service/Dockerfile
    container_name: foundflow-lost-item-service
    environment:
      SERVER_PORT: 8082
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://lost-item-db:5432/${LOST_ITEM_DB_NAME:?LOST_ITEM_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${LOST_ITEM_DB_USER:?LOST_ITEM_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${LOST_ITEM_DB_PASSWORD:?LOST_ITEM_DB_PASSWORD is required}
      PHOTO_STORAGE_PROVIDER: ${PHOTO_STORAGE_PROVIDER:-minio}
      PHOTO_STORAGE_ENDPOINT: http://minio:9000
      PHOTO_STORAGE_PUBLIC_ENDPOINT: ${PHOTO_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      PHOTO_STORAGE_ACCESS_KEY: ${PHOTO_STORAGE_ACCESS_KEY:?PHOTO_STORAGE_ACCESS_KEY is required}
      PHOTO_STORAGE_SECRET_KEY: ${PHOTO_STORAGE_SECRET_KEY:?PHOTO_STORAGE_SECRET_KEY is required}
      PHOTO_STORAGE_BUCKET: foundflow-lost-photos
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      GENAI_BASE_URL: ${GENAI_BASE_URL:-http://genai-service:8000}
      GENAI_API_KEY: ${GENAI_INTERNAL_TOKEN:-}
      GENAI_ENABLED: ${GENAI_ENABLED:-true}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      MATCHING_AUTO_INVITE_THRESHOLD: ${MATCHING_AUTO_INVITE_THRESHOLD:-0.85}
      MATCHING_REPUBLISH_SCORE_DELTA: ${MATCHING_REPUBLISH_SCORE_DELTA:-0.01}
    depends_on:
      lost-item-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  found-item-service:
    build:
      context: .
      dockerfile: ./services/found-item-service/Dockerfile
    container_name: foundflow-found-item-service
    environment:
      SERVER_PORT: 8083
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://found-item-db:5432/${FOUND_ITEM_DB_NAME:?FOUND_ITEM_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${FOUND_ITEM_DB_USER:?FOUND_ITEM_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${FOUND_ITEM_DB_PASSWORD:?FOUND_ITEM_DB_PASSWORD is required}
      PHOTO_STORAGE_PROVIDER: ${PHOTO_STORAGE_PROVIDER:-minio}
      PHOTO_STORAGE_ENDPOINT: http://minio:9000
      PHOTO_STORAGE_PUBLIC_ENDPOINT: ${PHOTO_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      PHOTO_STORAGE_ACCESS_KEY: ${PHOTO_STORAGE_ACCESS_KEY:?PHOTO_STORAGE_ACCESS_KEY is required}
      PHOTO_STORAGE_SECRET_KEY: ${PHOTO_STORAGE_SECRET_KEY:?PHOTO_STORAGE_SECRET_KEY is required}
      PHOTO_STORAGE_BUCKET: foundflow-found-photos
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      GENAI_BASE_URL: ${GENAI_BASE_URL:-http://genai-service:8000}
      GENAI_API_KEY: ${GENAI_INTERNAL_TOKEN:-}
      GENAI_ENABLED: ${GENAI_ENABLED:-true}
    depends_on:
      found-item-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    container_name: foundflow-matching-service
    environment:
      SERVER_PORT: 8084
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://matching-db:5432/${MATCHING_DB_NAME:?MATCHING_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${MATCHING_DB_USER:?MATCHING_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MATCHING_DB_PASSWORD:?MATCHING_DB_PASSWORD is required}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      GENAI_BASE_URL: ${GENAI_BASE_URL:-http://genai-service:8000}
      GENAI_API_KEY: ${GENAI_INTERNAL_TOKEN:-}
      GENAI_ENABLED: ${GENAI_ENABLED:-true}
    depends_on:
      matching-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      genai-service:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: foundflow-notification-service
    environment:
      SERVER_PORT: 8085
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/${NOTIFICATION_DB_NAME:?NOTIFICATION_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${NOTIFICATION_DB_USER:?NOTIFICATION_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:?MAGIC_LINK_SECRET is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      # Mail defaults to the local Mailpit sink so test/demo sends never reach the
      # shared Brevo account (every send to a fake recipient is a hard bounce that
      # harms sender reputation). Mailpit needs SMTP auth + STARTTLS off. To send
      # real mail through Brevo for a manual demo, set SPRING_MAIL_* in .env.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS: ${SPRING_MAIL_SMTP_STARTTLS:-false}
      FOUNDFLOW_MAIL_FROM: ${FOUNDFLOW_MAIL_FROM:-no-reply@foundflow.app}
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  pickup-service:
    build:
      context: .
      dockerfile: services/pickup-service/Dockerfile
    container_name: foundflow-pickup-service
    environment:
      SERVER_PORT: 8087
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://pickup-db:5432/${PICKUP_DB_NAME:?PICKUP_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${PICKUP_DB_USER:?PICKUP_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${PICKUP_DB_PASSWORD:?PICKUP_DB_PASSWORD is required}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:?MAGIC_LINK_SECRET is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    depends_on:
      pickup-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  operations-service:
    build:
      context: .
      dockerfile: services/operations-service/Dockerfile
    container_name: foundflow-operations-service
    environment:
      SERVER_PORT: 8086
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://operations-db:5432/${OPERATIONS_DB_NAME:?OPERATIONS_DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${OPERATIONS_DB_USER:?OPERATIONS_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${OPERATIONS_DB_PASSWORD:?OPERATIONS_DB_PASSWORD is required}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    depends_on:
      operations-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # One-shot demo seeder: waits for the API, logs in, creates the demo staff user,
  # and seeds three found/lost report pairs with photos. Idempotent and non-fatal;
  # disable with SEED_DEMO_DATA=false.
  seed:
    image: alpine:3.20
    container_name: foundflow-seed
    depends_on:
      - gateway-service
    environment:
      GATEWAY_BASE_URL: http://gateway-service:8080
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:?DEV_ADMIN_EMAIL is required}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:?DEV_ADMIN_PASSWORD is required}
      DEMO_VENUE_ID: "00000000-0000-0000-0000-000000000001"
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    volumes:
      - ./scripts/seed/seed-demo.sh:/seed/seed-demo.sh:ro
      - ./scripts/seed/assets:/seed/assets:ro
    entrypoint:
      - sh
      - -c
      - apk add --no-cache curl jq coreutils >/dev/null && sh /seed/seed-demo.sh
    restart: "no"

  ollama:
    image: ollama/ollama:0.4.2
    container_name: foundflow-ollama
    profiles: ["ollama"]
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: foundflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PHOTO_STORAGE_ACCESS_KEY:?PHOTO_STORAGE_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${PHOTO_STORAGE_SECRET_KEY:?PHOTO_STORAGE_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: foundflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Local/CI SMTP sink. notification-service delivers here by default (see its
  # SPRING_MAIL_* env) so test and demo flows never hit the shared Brevo account.
  # Web UI + REST API on 8025, SMTP on 1025. Captured mail: http://localhost:8025.
  mailpit:
    image: axllent/mailpit:v1.30.1
    container_name: foundflow-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # One-shot sidecar: pulls the configured chat + embed models on startup,
  # then exits 0. Both this and `ollama` are behind the "ollama" profile —
  # default `docker compose up` skips them (no image pull, no daemon).
  # Run `docker compose --profile ollama up` when you need the local LLM.
  # Pulled models are cached in the ollama-models volume across runs.
  ollama-init:
    image: ollama/ollama:0.4.2
    container_name: foundflow-ollama-init
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint:
      - sh
      - -c
      - >-
        ollama pull "$$OLLAMA_CHAT_MODEL" &&
        ollama pull "$$OLLAMA_VISION_MODEL" &&
        ollama pull "$$OLLAMA_EMBED_MODEL"
    restart: "no"

  genai-service:
    build:
      context: ./services/genai-service
    container_name: foundflow-genai-service
    ports:
      - "8000:8000"
    environment:
      LOG_FORMAT: json
      GENAI_PROVIDER: ${GENAI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      GENAI_TIMEOUT_SECONDS: ${GENAI_TIMEOUT_SECONDS:-30}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: foundflow-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # Trace store (single-binary mode, filesystem storage). Internal-only: Grafana
  # proxies queries, the Spring services push OTLP spans to tempo:4318 —
  # nothing on the host needs it.
  tempo:
    image: grafana/tempo:2.8.1
    container_name: foundflow-tempo
    command:
      - -config.file=/etc/tempo/tempo-config.yaml
    volumes:
      - ./infra/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # Log store (single-binary mode, filesystem storage). Internal-only: Grafana
  # proxies queries, Alloy pushes ingests — nothing on the host needs 3100.
  loki:
    image: grafana/loki:3.4.1
    container_name: foundflow-loki
    command:
      - -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # Log collector: tails every foundflow-* container's stdout/stderr via the
  # Docker socket and pushes to Loki. Services need no log config of their own.
  alloy:
    image: grafana/alloy:v1.8.3
    container_name: foundflow-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: foundflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # Admin SPA. Internal only — reached through the edge proxy (mirrors the k8s
  # ingress, where each frontend is a sibling Service behind one ingress).
  client:
    build:
      context: ./client
    container_name: foundflow-client
    depends_on:
      - gateway-service

  # Unauthenticated guest report SPA, its own deployable micro-frontend.
  public-report-client:
    build:
      context: ./public-report-client
    container_name: foundflow-public-report-client
    depends_on:
      - gateway-service

  # Single local entrypoint that mirrors the k8s ingress path routing:
  #   /api → gateway-service, /report → public-report-client, / → client.
  edge:
    build:
      context: ./edge
    container_name: foundflow-edge
    ports:
      - "3000:80"
    depends_on:
      - client
      - public-report-client
      - gateway-service

  auth-db:
    image: postgres:17
    container_name: foundflow-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:?AUTH_DB_NAME is required}
      POSTGRES_USER: ${AUTH_DB_USER:?AUTH_DB_USER is required}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:?AUTH_DB_USER is required} -d ${AUTH_DB_NAME:?AUTH_DB_NAME is required}"]
      interval: 5s
      timeout: 5s
      retries: 20

  found-item-db:
    image: postgres:17
    container_name: foundflow-found-item-db
    environment:
      POSTGRES_DB: ${FOUND_ITEM_DB_NAME:?FOUND_ITEM_DB_NAME is required}
      POSTGRES_USER: ${FOUND_ITEM_DB_USER:?FOUND_ITEM_DB_USER is required}
      POSTGRES_PASSWORD: ${FOUND_ITEM_DB_PASSWORD:?FOUND_ITEM_DB_PASSWORD is required}
    volumes:
