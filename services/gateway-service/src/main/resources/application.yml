server:
  port: 8080

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081
          jwk-set-uri: http://auth-service:8081/oauth2/jwks

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/api/users/**

            - id: lost-item-service
              uri: http://lost-item-service:8082
              predicates:
                - Path=/api/lost-reports/**

            - id: found-item-service
              uri: http://found-item-service:8083
              predicates:
                - Path=/api/found-items/**

            - id: matching-service
              uri: http://matching-service:8084
              predicates:
                - Path=/api/matches/**

            - id: notification-service
              uri: http://notification-service:8085
              predicates:
                - Path=/api/notifications/**

            - id: operations-service
              uri: http://operations-service:8086
              predicates:
                - Path=/api/venues/**

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
  endpoint:
    gateway:
      access: read-only