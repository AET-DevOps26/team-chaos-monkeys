---
- name: Deploy FoundFlow to Azure VM
  hosts: all
  gather_facts: true
  become: true

  vars:
    app_dir: /home/{{ ansible_user }}/foundflow
    repo_root: "{{ playbook_dir }}/../.."
    image_registry: ghcr.io/aet-devops26/team-chaos-monkeys
    image_tag: latest
    internal_service_token: "{{ lookup('env', 'INTERNAL_SERVICE_TOKEN') }}"

  handlers:
    - name: Reset SSH connection
      meta: reset_connection

  tasks:
    - name: Wait for SSH to come up (cloud-init may still be running)
      ansible.builtin.wait_for_connection:
        timeout: 180

    - name: Install Docker apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - rsync
          - python3-docker
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker apt repository (signed)
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: "https://download.docker.com/linux/ubuntu"
        suites: "{{ ansible_distribution_release }}"
        components: stable
        architectures: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
        signed_by: https://download.docker.com/linux/ubuntu/gpg
        state: present
        enabled: true
      register: docker_repo

    - name: Refresh apt cache after adding Docker repo
      ansible.builtin.apt:
        update_cache: true
      when: docker_repo.changed

    - name: Install Docker engine + compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      notify: Reset SSH connection

    - name: Flush handlers so the docker group takes effect before compose runs
      ansible.builtin.meta: flush_handlers

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: Sync repo to VM
      ansible.posix.synchronize:
        src: "{{ repo_root }}/"
        dest: "{{ app_dir }}/"
        delete: true
        recursive: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=.idea"
          - "--exclude=.vscode"
          - "--exclude=.DS_Store"
          - "--exclude=node_modules"
          - "--exclude=client/dist"
          - "--exclude=services/*/build"
          - "--exclude=services/*/.gradle"
          - "--exclude=services/*/target"
          - "--exclude=deploy/terraform/.terraform"
          - "--exclude=deploy/terraform/*.tfstate*"
          - "--exclude=deploy/terraform/tfplan*"
          - "--exclude=deploy/terraform/terraform.tfvars"
          - "--exclude=deploy/ansible/.env"
          - "--exclude=.env"
          - "--exclude=meeting-notes.*"
          - "--exclude=tasks"
          - "--exclude=.claude"
      become: false

    - name: Fix ownership on synced tree
      ansible.builtin.file:
        path: "{{ app_dir }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Require internal service token
      ansible.builtin.assert:
        that:
          - internal_service_token is defined
          - internal_service_token | length > 0
        fail_msg: "Set INTERNAL_SERVICE_TOKEN or pass -e internal_service_token=... before deploying."

    - name: Render .env from template
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Pull container images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - docker-compose.yml
          - deploy/docker-compose.prod.yml
        pull: always
        state: present
      become: false
      environment:
        IMAGE_REGISTRY: "{{ image_registry }}"
        IMAGE_TAG: "{{ image_tag }}"
      register: compose_pull

    - name: Bring stack up
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - docker-compose.yml
          - deploy/docker-compose.prod.yml
        state: present
        recreate: auto
        remove_orphans: true
      become: false
      environment:
        IMAGE_REGISTRY: "{{ image_registry }}"
        IMAGE_TAG: "{{ image_tag }}"

    - name: Wait for gateway health
      ansible.builtin.uri:
        url: http://localhost:8080/actuator/health
        status_code: 200
        validate_certs: false
      register: gateway_health
      retries: 30
      delay: 5
      until: gateway_health.status == 200
      changed_when: false

    - name: Wait for frontend to serve
      ansible.builtin.uri:
        url: http://localhost/
        status_code: 200
      retries: 12
      delay: 5
      register: frontend_check
      until: frontend_check.status == 200
      changed_when: false
