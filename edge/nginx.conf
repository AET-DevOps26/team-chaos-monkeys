server {
    listen 80;
    server_name _;

    # Mirrors the Kubernetes ingress so local docker-compose composes the two
    # micro-frontends the same way production does:
    #   /api    → gateway-service   (single backend ingress)
    #   /report → public-report-client (unauthenticated guest report SPA)
    #   /       → client            (authenticated admin SPA, catch-all)

    # Compress proxied responses (the k8s path gets this from the SPA nginx
    # containers directly; keep the compose front door consistent).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    location /api/ {
        # Photo uploads allow 10 MB (12 MB multipart request); the nginx
        # default of 1m would 413 them before the gateway (#325).
        client_max_body_size 12m;
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Path preserved (no trailing slash on proxy_pass) so the public SPA's nginx
    # receives /report/... and serves its bundle from there.
    location /report {
        proxy_pass http://public-report-client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
