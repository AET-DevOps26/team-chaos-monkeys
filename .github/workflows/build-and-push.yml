name: Build and push images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push (defaults to latest)
        required: false
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      IMAGE_REGISTRY: ghcr.io/aet-devops26/team-chaos-monkeys
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      OPENAI_API_KEY: ci-build-placeholder
      SPRING_MAIL_USERNAME: ci-build-placeholder
      SPRING_MAIL_PASSWORD: ci-build-placeholder
      FOUNDFLOW_MAIL_FROM: ci-build-placeholder@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env file
        run: cp .env.example .env

      - name: Build images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            build

      - name: Push images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            push

      - name: Summarise
        run: |
          echo "Pushed to: $IMAGE_REGISTRY/* :$IMAGE_TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "View: https://github.com/AET-DevOps26/team-chaos-monkeys/pkgs/container" >> "$GITHUB_STEP_SUMMARY"
