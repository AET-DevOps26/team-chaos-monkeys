# infra/prometheus/alerts.yml
groups:
  - name: foundflow-availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.job }} for 1 minute."

      - alert: HighErrorRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m]))
            /
          sum by (job) (rate(http_server_requests_seconds_count[5m]))
            > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }}: server error rate > 1%"
          description: "5xx rate has exceeded 1% over the last 5 minutes."

  - name: foundflow-genai
    rules:
      - alert: GenAIProviderFailureRate
        expr: |
          sum by (provider, endpoint) (
            rate(genai_provider_requests_total{outcome!="ok"}[5m])
          )
            /
          sum by (provider, endpoint) (
            rate(genai_provider_requests_total[5m])
          )
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GenAI provider {{ $labels.provider }} failing on {{ $labels.endpoint }}"
          description: "Non-ok provider outcomes exceed 5% of calls over the last 5 minutes."

      - alert: GenAIProviderSlow
        expr: |
          histogram_quantile(
            0.95,
            sum by (provider, endpoint, le) (
              rate(genai_provider_request_duration_seconds_bucket[5m])
            )
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GenAI provider {{ $labels.provider }} slow on {{ $labels.endpoint }}"
          description: "p95 provider-call latency > 5s over the last 10 minutes."

      - alert: GenAIValidationErrorSpike
        expr: |
          sum by (endpoint) (
            rate(genai_validation_errors_total[5m])
          )
            /
          sum by (endpoint) (
            rate(genai_provider_requests_total{outcome="ok"}[5m])
          )
            > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Model output failing validation on {{ $labels.endpoint }}"
          description: "Validation failures exceed 10% of successful provider calls over the last 5 minutes."

  - name: foundflow-rabbitmq
    rules:
      - alert: RabbitMqDeadLetterQueueNotEmpty
        expr: rabbitmq_queue_messages_ready{queue=~".*\\.dlq"} > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ DLQ {{ $labels.queue }} has messages"
          description: "Dead-letter queue {{ $labels.queue }} has had ready messages for at least 2 minutes."
