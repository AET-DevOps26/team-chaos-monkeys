# infra/prometheus/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: lost-item-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['lost-item-service:8082']

  - job_name: found-item-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['found-item-service:8083']

  - job_name: matching-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['matching-service:8084']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8085']

  - job_name: operations-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['operations-service:8086']

  - job_name: genai-service
    metrics_path: /metrics
    static_configs:
      - targets: ['genai-service:8000']
