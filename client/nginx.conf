server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # No /api proxy here: the edge (compose) / ingress (k8s) owns /api and routes
    # it to the gateway. This container only serves the static admin bundle.

    # Vite content-hashes asset filenames, so they can be cached forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback so client-side routes resolve on hard refresh. index.html is
    # the mutable pointer to the hashed assets — never cache it.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
