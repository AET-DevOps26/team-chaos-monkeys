{{/*
One Deployment per entry in `services:` (values.yaml).
Image, env, probes, and metrics are filled in by helpers in _helpers.tpl.
*/}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "foundflow.svcLabels" (dict "ctx" $ "name" $name) | nindent 4 }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      {{- include "foundflow.selectorLabels" (dict "ctx" $ "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foundflow.svcLabels" (dict "ctx" $ "name" $name) | nindent 8 }}
      {{- if $svc.metrics }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: {{ include "foundflow.metricsPath" (dict "svc" $svc) | quote }}
      {{- end }}
    spec:
      containers:
        - name: app
          image: {{ include "foundflow.image" (dict "ctx" $ "name" $name "svc" $svc) | quote }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          {{- $health := include "foundflow.healthPath" (dict "svc" $svc) }}
          readinessProbe:
            httpGet:
              path: {{ $health }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: {{ $health }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            {{- include "foundflow.env" (dict "ctx" $ "name" $name "svc" $svc) | nindent 12 }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
