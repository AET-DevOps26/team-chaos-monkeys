spring.datasource.url=jdbc:h2:mem:matching_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.sql.init.mode=never

spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

genai.base-url=http://localhost:9999/api/v1
genai.connect-timeout=PT2S
genai.read-timeout=PT5S
genai.api-key=
genai.enabled=false
# AttributeExtractionAutoConfiguration only activates if PhotoStorage is on the
# classpath. matching-service doesn't depend on photo-storage, so the
# AttributeExtractionService bean is not registered and no photo-storage.*
# placeholders need to resolve.
