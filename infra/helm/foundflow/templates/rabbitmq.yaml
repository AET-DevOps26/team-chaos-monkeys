{{/*
In-namespace RabbitMQ broker. Renders:
  - Secret  foundflow-rabbitmq   (keys: username, password — username from
    values, password fixed if set or randomised on first install and held
    stable across upgrades via lookup() — same pattern as databases.yaml)
  - ConfigMap rabbitmq-conf      (disk_free_limit + vm_memory_high_watermark)
  - Service rabbitmq             (ClusterIP, AMQP on 5672)
  - Deployment rabbitmq          (single replica; emptyDir or PVC depending on
    rabbitmq.persistence.enabled)

Plain rabbitmq:4.0 image — no management plugin (web UI dropped to fit the tight
AET quota; see values.yaml). AMQP on 5672 is the bus; readiness is a CLI ping,
not HTTP, so no management port is exposed.

Service name "rabbitmq" deliberately matches docker-compose so Spring services
consume the same SPRING_RABBITMQ_HOST=rabbitmq value everywhere.

Persistence is opt-in. With persistence off, queue contents are lost on pod
restart — acceptable for the transient domain events we publish; flip on if
you need broker data survivability. Clean up old queues explicitly when durable queue
names change.
*/}}
{{- if .Values.rabbitmq.enabled -}}
{{- $existing := lookup "v1" "Secret" .Values.namespace.name "foundflow-rabbitmq" -}}
{{- $password := "" -}}
{{- if .Values.rabbitmq.password -}}
{{- $password = .Values.rabbitmq.password -}}
{{- else if and $existing $existing.data $existing.data.password -}}
{{- $password = index $existing.data "password" | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 24 -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: foundflow-rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: broker
type: Opaque
stringData:
  username: {{ .Values.rabbitmq.username | quote }}
  password: {{ $password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-conf
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: broker
data:
  10-foundflow.conf: |
    # No node DiskPressure exists; keep RabbitMQ's own disk-free alarm from
    # tripping on the small ephemeral volume (a full emptyDir on a long-lived
    # crashlooping pod was a prior false alarm). 50MB is ample for transient events.
    disk_free_limit.absolute = 50MB
    # Block publishers only near the top of the memory limit, leaving boot headroom
    # within the 384Mi cap so the broker doesn't trip its watermark on startup.
    vm_memory_high_watermark.relative = 0.7
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: broker
spec:
  type: ClusterIP
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
      protocol: TCP
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if .Values.rabbitmq.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.global.storageClassName }}
  storageClassName: {{ .Values.global.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.rabbitmq.persistence.storageSize | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: broker
spec:
  replicas: 1
  # Recreate, not RollingUpdate: a surge pod would briefly double this
  # Deployment's footprint and can tip the tight AET namespace quota
  # (4 CPU / 6Gi) into rejecting pods during a deploy. See deployments.yaml.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "foundflow.labels" . | nindent 8 }}
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/component: broker
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: foundflow-rabbitmq
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: foundflow-rabbitmq
                  key: password
            # Erlang starts one scheduler (and allocator carriers) per *node*
            # CPU core — it does not see the container CPU limit — so on a
            # 6-core AET node the BEAM's memory overhead blows past the 384Mi
            # cap at boot and the kernel OOM-kills it. Pin schedulers low and
            # disable scheduler busy-wait to keep the broker inside its limit.
            - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
              value: "+S 2:2 +sbwt none +sbwtdcpu none +sbwtdio none"
            # CLI tools (rabbitmq-diagnostics/rabbitmqctl) each spawn their own
            # Erlang VM; without this they too grab a scheduler per node core and
            # OOM inside the 384Mi cap. Kept so manual diagnostics don't kill the pod.
            - name: RABBITMQ_CTL_ERL_ARGS
              value: "+S 2:2 +sbwt none +sbwtdcpu none +sbwtdio none"
          # TCP probes, not `rabbitmq-diagnostics ping`: the diagnostics CLI spins
          # up an Erlang node that OOMs the pod under the tight memory limit (the
          # liveness variant was killing the broker on every cycle). A 5672 connect
          # confirms the AMQP listener is accepting, which is the readiness signal
          # the Spring services actually need.
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: conf
              mountPath: /etc/rabbitmq/conf.d
              readOnly: true
          {{- with .Values.rabbitmq.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: conf
          configMap:
            name: rabbitmq-conf
        - name: data
          {{- if .Values.rabbitmq.persistence.enabled }}
          persistentVolumeClaim:
            claimName: rabbitmq
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
