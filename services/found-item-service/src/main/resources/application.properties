spring.application.name=found-item-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info
# Export http.server.requests as a histogram so Grafana can compute p95 latency.
management.metrics.distribution.percentiles-histogram.http.server.requests=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

foundflow.internal.token=${INTERNAL_SERVICE_TOKEN}

photo-storage.domain=found-items
photo-storage.signed-url-ttl=${PHOTO_STORAGE_SIGNED_URL_TTL:PT10M}
photo-storage.bucket=${PHOTO_STORAGE_BUCKET:foundflow-found-photos}
photo-storage.container=${PHOTO_STORAGE_CONTAINER:foundflow-found-photos}

# GenAI service: best-effort attribute extraction after intake (issue #128).
# Failures never block the intake; see AttributeExtractionService.
genai.base-url=${GENAI_BASE_URL:http://genai-service:8000}
genai.connect-timeout=${GENAI_CONNECT_TIMEOUT:PT2S}
genai.read-timeout=${GENAI_READ_TIMEOUT:PT15S}
genai.api-key=${GENAI_API_KEY:}
genai.enabled=${GENAI_ENABLED:true}
