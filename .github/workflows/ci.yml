name: FoundFlow CI

on:
  push:
    branches:
      - development
      - main

  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Check backend services
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - lost-item-service
          - found-item-service
          - gateway-service
          - matching-service
          - notification-service
          - operations-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        working-directory: ./services/${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: Run checks for ${{ matrix.service }}
        working-directory: ./services/${{ matrix.service }}
        run: ./gradlew check

  genai-tests:
    name: Check genai-service
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/genai-service/pyproject.toml

      - name: Install genai-service with dev deps
        working-directory: ./services/genai-service
        run: pip install -e '.[dev]'

      - name: Lint with ruff
        working-directory: ./services/genai-service
        run: ruff check

      - name: Run unit + contract tests
        working-directory: ./services/genai-service
        run: pytest -v

  prometheus-rules-tests:
    name: Test Prometheus alert rules
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run promtool test rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "$PWD/infra/prometheus:/etc/prometheus" \
            prom/prometheus:v2.55.1 \
            test rules /etc/prometheus/alerts_test.yml

  client-build:
    name: Build client
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        run: npm run build

  codegen-check:
    name: Verify Orval client matches committed specs
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Regenerate client from committed specs
        working-directory: ./client
        run: npm run codegen

      - name: Fail if generated client drifted
        run: git diff --exit-code client/src/api

  e2e-tests:
    name: Run Docker Compose E2E flow
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs:
      - backend-tests
      - client-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare CI environment file
        run: cp .env.example .env

      - name: Build and start backend stack
        run: |
          docker compose up --build -d \
            auth-service \
            lost-item-service \
            found-item-service \
            matching-service \
            notification-service \
            operations-service \
            gateway-service

      - name: Show running containers
        run: docker compose ps

      - name: Wait for backend services
        shell: bash
        run: |
          set -euo pipefail

          services=(
            "gateway-service|http://localhost:8080/actuator/health"
            "auth-service|http://localhost:8080/auth/actuator/health"
            "lost-item-service|http://localhost:8080/lost-items/actuator/health"
            "found-item-service|http://localhost:8080/found-items/actuator/health"
            "matching-service|http://localhost:8080/matches/actuator/health"
            "notification-service|http://localhost:8080/notifications/actuator/health"
            "operations-service|http://localhost:8080/venues/actuator/health"
          )

          check_service() {
            local name="$1"
            local url="$2"

            echo "Waiting for $name at $url..."

            for i in {1..30}; do
              if curl --fail --silent --show-error "$url" > /dev/null; then
                echo "$name is reachable."
                return 0
              fi

              sleep 5
            done

            echo "$name did not become reachable in time."
            return 1
          }

          pids=()

          for entry in "${services[@]}"; do
            name="${entry%%|*}"
            url="${entry#*|}"

            check_service "$name" "$url" &
            pids+=($!)
          done

          failed=0

          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              failed=1
            fi
          done

          exit "$failed"

      - name: Run E2E test suite
        shell: pwsh
        run: ./tests/e2e/foundflow-e2e.ps1

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: docker compose down -v
