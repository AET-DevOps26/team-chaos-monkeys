server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # No /api proxy here: the edge (compose) / ingress (k8s) owns /api and routes
    # it to the gateway. This container only serves the static bundle.

    # Bare /report → canonical /report/.
    location = /report {
        return 301 /report/;
    }

    # The bundle lives under /report (Vite base '/report/'). SPA fallback so
    # client-side routes like /report/confirmation resolve on hard refresh.
    location /report/ {
        try_files $uri $uri/ /report/index.html;
    }
}
