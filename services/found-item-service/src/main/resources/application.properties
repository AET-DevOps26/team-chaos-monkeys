spring.application.name=found-item-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

photo-storage.domain=found-items
photo-storage.bucket=${PHOTO_STORAGE_BUCKET:foundflow-found-photos}
photo-storage.container=${PHOTO_STORAGE_CONTAINER:foundflow-found-photos}
