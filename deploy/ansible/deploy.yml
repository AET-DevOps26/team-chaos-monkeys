---
- name: Deploy FoundFlow to Azure VM
  hosts: all
  gather_facts: true
  become: true

  vars:
    app_dir: /home/{{ ansible_user }}/foundflow
    repo_root: "{{ playbook_dir }}/../.."
    image_registry: ghcr.io/aet-devops26/team-chaos-monkeys
    image_tag: latest
    internal_service_token: "{{ lookup('env', 'INTERNAL_SERVICE_TOKEN') }}"

  handlers:
    - name: Reset SSH connection
      meta: reset_connection

  tasks:
    - name: Wait for SSH to come up (cloud-init may still be running)
      ansible.builtin.wait_for_connection:
        timeout: 180

    - name: Install Docker apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - rsync
          - python3-docker
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker apt repository (signed)
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: "https://download.docker.com/linux/ubuntu"
        suites: "{{ ansible_distribution_release }}"
        components: stable
        architectures: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
        signed_by: https://download.docker.com/linux/ubuntu/gpg
        state: present
        enabled: true
      register: docker_repo

    - name: Refresh apt cache after adding Docker repo
      ansible.builtin.apt:
        update_cache: true
      when: docker_repo.changed

    - name: Install Docker engine + compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      notify: Reset SSH connection

    - name: Flush handlers so the docker group takes effect before compose runs
      ansible.builtin.meta: flush_handlers

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: Sync repo to VM
      ansible.posix.synchronize:
        src: "{{ repo_root }}/"
        dest: "{{ app_dir }}/"
        delete: true
        recursive: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=.idea"
          - "--exclude=.vscode"
          - "--exclude=.DS_Store"
          - "--exclude=node_modules"
          - "--exclude=client/dist"
          - "--exclude=services/*/build"
          - "--exclude=services/*/.gradle"
          - "--exclude=services/*/target"
          - "--exclude=deploy/terraform/.terraform"
          - "--exclude=deploy/terraform/*.tfstate*"
          - "--exclude=deploy/terraform/tfplan*"
          - "--exclude=deploy/terraform/terraform.tfvars"
          - "--exclude=deploy/ansible/.env"
          - "--exclude=.env"
          - "--exclude=meeting-notes.*"
          - "--exclude=tasks"
          - "--exclude=.claude"
      become: false

    - name: Fix ownership on synced tree
      ansible.builtin.file:
        path: "{{ app_dir }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Require internal service token
      ansible.builtin.assert:
        that:
          - internal_service_token is defined
          - internal_service_token | length > 0
        fail_msg: "Set INTERNAL_SERVICE_TOKEN or pass -e internal_service_token=... before deploying."

    - name: Render .env from template
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Pull container images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - docker-compose.yml
          - deploy/docker-compose.prod.yml
        pull: always
        state: present
      become: false
      environment:
        IMAGE_REGISTRY: "{{ image_registry }}"
        IMAGE_TAG: "{{ image_tag }}"
      register: compose_pull

    - name: Bring stack up
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - docker-compose.yml
          - deploy/docker-compose.prod.yml
        state: present
        recreate: auto
        remove_orphans: true
      become: false
      environment:
        IMAGE_REGISTRY: "{{ image_registry }}"
        IMAGE_TAG: "{{ image_tag }}"

    - name: Wait for gateway health
      ansible.builtin.uri:
        url: http://localhost:8080/actuator/health
        status_code: 200
        validate_certs: false
      register: gateway_health
      retries: 30
      delay: 5
      until: gateway_health.status == 200
      changed_when: false

    - name: Wait for frontend to serve
      ansible.builtin.uri:
        url: http://localhost/
        status_code: 200
      retries: 12
      delay: 5
      register: frontend_check
      until: frontend_check.status == 200
      changed_when: false

    - name: Wait for notification service health
      ansible.builtin.uri:
        url: http://localhost:8080/notifications/actuator/health
        status_code: 200
        validate_certs: false
      register: notification_health
      retries: 30
      delay: 5
      until: notification_health.status == 200
      changed_when: false

    - name: Prepare Brevo delivery test event
      ansible.builtin.set_fact:
        brevo_test_event_id: "{{ lookup('pipe', 'cat /proc/sys/kernel/random/uuid') }}"
        brevo_test_match_id: "{{ lookup('pipe', 'cat /proc/sys/kernel/random/uuid') }}"
        brevo_test_venue_id: "{{ lookup('pipe', 'cat /proc/sys/kernel/random/uuid') }}"
      when: brevo_test_recipient | default('') | length > 0
      no_log: true

    - name: Publish one match invite for the Brevo delivery test
      ansible.builtin.uri:
        url: http://localhost:15672/api/exchanges/%2F/foundflow.domain-events/publish
        method: POST
        user: foundflow
        password: foundflow
        force_basic_auth: true
        body_format: json
        body:
          properties:
            content_type: application/json
            headers:
              __TypeId__: com.foundflow.events.MatchInviteRequestedEvent
          routing_key: match-invite.requested.v1
          payload: >-
            {{
              {
                'eventId': brevo_test_event_id,
                'occurredAt': ansible_date_time.iso8601,
                'matchId': brevo_test_match_id,
                'recipient': brevo_test_recipient,
                'venueId': brevo_test_venue_id,
                'matchUrl': public_base_url ~ '/api/matches/public/' ~ brevo_test_match_id
              } | to_json
            }}
          payload_encoding: string
        status_code: 200
        return_content: true
      register: brevo_publish
      failed_when: brevo_publish.json.routed | default(false) != true
      when: brevo_test_recipient | default('') | length > 0
      no_log: true

    - name: Wait for Brevo to accept the test email
      community.docker.docker_container_exec:
        container: foundflow-notification-db
        command: >-
          psql -U notification_user -d notification_db -tAc
          "SELECT CASE WHEN sent_at IS NOT NULL THEN 'sent' ELSE 'pending' END
          FROM notifications WHERE match_id = '{{ brevo_test_match_id }}'"
      register: brevo_delivery
      retries: 12
      delay: 5
      until: brevo_delivery.stdout | trim == "sent"
      changed_when: false
      when: brevo_test_recipient | default('') | length > 0
      no_log: true

    - name: Report Brevo delivery test result
      ansible.builtin.debug:
        msg: Brevo accepted the Azure match-invite test email.
      when: brevo_test_recipient | default('') | length > 0
