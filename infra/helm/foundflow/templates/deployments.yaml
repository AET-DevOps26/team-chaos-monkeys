{{/*
One Deployment per entry in `services:` (values.yaml).
Image, env, probes, and metrics are filled in by helpers in _helpers.tpl.

DB readiness / startup ordering:
Kubernetes has no `depends_on` equivalent — Helm releases are not pod-ordered,
and Deployments don't wait on StatefulSets. Spring services that declare a
`dbRef` will start before their Postgres pod is Ready, fail the JDBC
connection, and CrashLoopBackOff until kubelet's exponential backoff hits a
retry where Postgres is up (usually 30–90s on first install). This is
self-healing and harmless, but it makes `helm install --wait` look noisy on
cold starts.
If we ever want clean startup, add an initContainer per service that loops on
`pg_isready -h <dbRef> -p 5432` before the app container runs. Skipped for
now: the crash-loop is cheap, and the alternative adds a container to every
Deployment for a one-time cosmetic win.
*/}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "foundflow.svcLabels" (dict "ctx" $ "name" $name) | nindent 4 }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  # Recreate (not the default RollingUpdate) so a deploy never runs the old and
  # new pod of a single-replica Deployment at the same time. The AET namespace
  # quota (4 CPU / 6Gi) fits the stack at rest with almost no headroom, and CD
  # rewrites the image tag on every service at once — a rolling surge would
  # double several pods simultaneously, exceed the quota, leave the surge/DB
  # pods Pending, and deadlock `helm upgrade --wait --atomic`. Recreate trades a
  # few seconds of per-service downtime for a rollout that stays within quota.
  strategy:
    type: {{ default "Recreate" $svc.strategy }}
  selector:
    matchLabels:
      {{- include "foundflow.selectorLabels" (dict "ctx" $ "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foundflow.svcLabels" (dict "ctx" $ "name" $name) | nindent 8 }}
      {{- if $svc.metrics }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: {{ include "foundflow.metricsPath" (dict "svc" $svc) | quote }}
      {{- end }}
    spec:
      containers:
        - name: app
          image: {{ include "foundflow.image" (dict "ctx" $ "name" $name "svc" $svc) | quote }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          {{- $health := include "foundflow.healthPath" (dict "svc" $svc) }}
          # Give slow boots (JVM startup under a tight CPU limit, AMQP broker
          # not ready yet) up to 300s before liveness takes over (#316).
          startupProbe:
            httpGet:
              path: {{ $health }}
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: {{ $health }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: {{ $health }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            {{- if eq (default "spring" $svc.kind) "spring" }}
            # Keep the JVM heap inside the (tight) memory limit so the
            # container is not OOMKilled before Spring Boot finishes booting.
            # MaxRAMPercentage=55 (#363): live heap runs ~35% of the old 70%
            # cap, so the extra committed heap was pure working-set waste that
            # left matching/lost-item at 96-98% of their 416Mi limit. 55% (~229Mi
            # cap) is still >2x observed peak and widens OOM headroom ~50-70Mi.
            - name: JAVA_TOOL_OPTIONS
              value: {{ default "-XX:MaxRAMPercentage=55.0 -XX:InitialRAMPercentage=25.0" $svc.javaToolOptions | quote }}
            # Native Boot structured logging (issue #278): ECS JSON to stdout so
            # Loki's `| json` parser gets fields. Only set in containers —
            # `./gradlew bootRun` stays human-readable.
            - name: LOGGING_STRUCTURED_FORMAT_CONSOLE
              value: "ecs"
            {{- if $.Values.tempo.enabled }}
            # Distributed tracing (issue #279): export OTLP spans straight to
            # Tempo's built-in receiver. 100% sampling — at course traffic,
            # sampling is a cost lever we don't need. Container-only env, so
            # bare `./gradlew bootRun` traces nothing and stays quiet.
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              value: "http://tempo:4318/v1/traces"
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"
            {{- end }}
            {{- end }}
            {{- if and (eq (default "spring" $svc.kind) "python") $.Values.tempo.enabled }}
            # Distributed tracing (issue #280): same direct-to-Tempo OTLP
            # export as the Spring services; app/tracing.py gates on this env.
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://tempo:4318/v1/traces"
            {{- end }}
            {{- include "foundflow.env" (dict "ctx" $ "name" $name "svc" $svc) | nindent 12 }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
