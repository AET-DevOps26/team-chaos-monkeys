spring.application.name=pickup-service
server.port=${SERVER_PORT:8087}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}

foundflow.public.base-url=${PUBLIC_BASE_URL:http://localhost:3000}
foundflow.magic-link.secret=${MAGIC_LINK_SECRET:foundflow-local-dev-magic-link-secret-change-me}
foundflow.magic-link.ttl-days=${MAGIC_LINK_TTL_DAYS:7}
