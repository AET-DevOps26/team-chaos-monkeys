{{/*
Grafana admin login. User is `admin`; password precedence:
secrets.grafanaAdminPassword (CI-injected) → grafana.adminPassword → `admin`.
The password lives in this Secret only; the pod's emptyDir grafana.db re-seeds
from it on every restart, so this is the single source of truth.
*/}}
{{- if .Values.grafana.enabled -}}
{{- $pwd := .Values.secrets.grafanaAdminPassword | default .Values.grafana.adminPassword | default "admin" -}}
apiVersion: v1
kind: Secret
metadata:
  name: foundflow-grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
type: Opaque
stringData:
  admin-user: {{ .Values.grafana.adminUser | quote }}
  admin-password: {{ $pwd | quote }}
{{- end }}
