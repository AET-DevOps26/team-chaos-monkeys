name: Build and push images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push (defaults to latest)
        required: false
        default: latest
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to push
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_REGISTRY: ghcr.io/aet-devops26/team-chaos-monkeys
      IMAGE_TAG: ${{ inputs.image_tag }}
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      OPENAI_API_KEY: ci-build-placeholder
      SPRING_MAIL_USERNAME: ci-build-placeholder
      SPRING_MAIL_PASSWORD: ci-build-placeholder
      FOUNDFLOW_MAIL_FROM: ci-build-placeholder@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env file
        run: cp .env.example .env

      - name: Build images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            build

      - name: Push images
        run: |
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            push

      - name: Tag and push :latest
        # Not a real prod setup — we always want :latest to track whatever we
        # just built, so Azure and tag-less `docker compose pull` stay current.
        run: |
          set -euo pipefail
          # Derive the pushed refs from compose itself — no hardcoded service
          # list to drift. Filter to our GHCR namespace so official base images
          # (postgres, rabbitmq, …) are never re-tagged or pushed.
          docker compose \
            -f docker-compose.yml \
            -f deploy/docker-compose.prod.yml \
            config --images \
            | grep "^$IMAGE_REGISTRY/" \
            | while read -r ref; do
                latest="${ref%:*}:latest"
                docker tag "$ref" "$latest"
                docker push "$latest"
              done

      - name: Summarise
        run: |
          {
            echo "### Images pushed"
            echo
            echo "- Registry: \`$IMAGE_REGISTRY\`"
            echo "- Tags: \`$IMAGE_TAG\` + \`latest\`"
            echo "- View: https://github.com/AET-DevOps26/team-chaos-monkeys/pkgs/container"
          } >> "$GITHUB_STEP_SUMMARY"
