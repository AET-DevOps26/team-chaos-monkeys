{{/*
Loki single-binary log store, self-deployed like Grafana (Rancher Monitoring
ships neither Loki nor Tempo). Logs live on a small PVC so they survive the
Recreate-on-every-CD-deploy cycle — with emptyDir every merge to main would
wipe the log history.
*/}}
{{- if .Values.loki.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: loki
spec:
  replicas: 1
  # Recreate: single replica on an RWO volume, and no surge pod against the
  # tight AET namespace quota (see deployments.yaml).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "foundflow.labels" . | nindent 8 }}
        app.kubernetes.io/name: loki
        app.kubernetes.io/component: loki
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/loki/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        # The grafana/loki image runs as uid 10001; fsGroup makes the PVC writable.
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: {{ .Values.loki.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/loki-config.yaml
          ports:
            - name: http
              containerPort: 3100
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
          {{- with .Values.loki.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: foundflow-loki-config
        - name: storage
          persistentVolumeClaim:
            claimName: loki-data
{{- end }}
