name: GenAI integration tests

# Hits a real Ollama backend rather than respx mocks. Catches drift
# between the SDK and the live service (model rename, response shape
# change, etc.) before the demo, not during it.
#
# Does NOT gate PRs — runs nightly and on push to main.

on:
  push:
    branches:
      - main
  schedule:
    # 05:00 UTC ~ 07:00 Munich
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ollama-integration:
    name: Ollama provider — real backend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Don't block main on flakes during the stabilization period; tighten
    # once the suite has run cleanly for ~a week.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/genai-service/pyproject.toml

      - name: Install genai-service with dev deps
        working-directory: ./services/genai-service
        run: pip install -e '.[dev]'

      - name: Start Ollama
        run: |
          docker run -d --name ollama \
            -p 11434:11434 \
            -v ollama-models:/root/.ollama \
            ollama/ollama:0.4.2

      - name: Wait for Ollama to be ready
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:11434/api/version > /dev/null; then
              echo "Ollama is up"
              exit 0
            fi
            sleep 2
          done
          echo "Ollama did not become reachable"
          exit 1

      - name: Pull tiny chat + embed models
        run: |
          docker exec ollama ollama pull qwen2.5:0.5b
          docker exec ollama ollama pull nomic-embed-text

      - name: Start genai-service
        working-directory: ./services/genai-service
        env:
          GENAI_PROVIDER: local
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_CHAT_MODEL: qwen2.5:0.5b
          OLLAMA_EMBED_MODEL: nomic-embed-text
          GENAI_TIMEOUT_SECONDS: '120'
          EMBEDDING_DIMENSIONS: '768'
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/genai.log 2>&1 &
          # Wait for service to be ready
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/health > /dev/null; then
              echo "genai-service is up"
              exit 0
            fi
            sleep 1
          done
          echo "genai-service did not become reachable"
          cat /tmp/genai.log
          exit 1

      - name: Verify /_diagnostic reports actual dim 768
        run: |
          set -euo pipefail
          DIAG=$(curl -fsS http://localhost:8000/_diagnostic)
          CONFIGURED=$(echo "$DIAG" | python -c "import sys,json;print(json.load(sys.stdin)['embed_dimensions_configured'])")
          ACTUAL=$(echo "$DIAG" | python -c "import sys,json;print(json.load(sys.stdin)['embed_dimensions_actual'])")
          if [ "$CONFIGURED" != "768" ] || [ "$ACTUAL" != "768" ]; then
            echo "Expected 768/768, got configured=$CONFIGURED actual=$ACTUAL"
            exit 1
          fi

      - name: Run integration tests
        working-directory: ./services/genai-service
        env:
          GENAI_RUN_INTEGRATION: '1'
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_CHAT_MODEL: qwen2.5:0.5b
          OLLAMA_EMBED_MODEL: nomic-embed-text
          GENAI_TIMEOUT_SECONDS: '120'
          EMBEDDING_DIMENSIONS: '768'
        run: pytest tests/integration/ -v

      - name: Dump Ollama logs on failure
        if: failure()
        run: docker logs ollama

      - name: Stop Ollama
        if: always()
        run: docker rm -f ollama
