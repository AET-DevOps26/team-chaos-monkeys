name: FoundFlow CI

on:
  push:
    branches:
      - development
      - main

  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: SCA dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development, unknown

  secret-scan:
    name: Scan for secrets (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # full history so gitleaks scans every commit, not just the tip
          fetch-depth: 0

      # gitleaks/gitleaks-action requires a paid GITLEAKS_LICENSE for org
      # repos, so run the pinned binary directly (same engine, no license).
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks git --no-banner --redact -v .

  backend-tests:
    name: Check backend services
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - lost-item-service
          - found-item-service
          - gateway-service
          - matching-service
          - pickup-service
          - notification-service
          - operations-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        working-directory: ./services/${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: Run checks for ${{ matrix.service }}
        working-directory: ./services/${{ matrix.service }}
        run: ./gradlew check

  shared-backend-checks:
    name: Check shared backend libraries
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        project:
          - shared/common-domain
          - shared/domain-events
          - shared/genai-client
          - shared/magic-link
          - shared/photo-storage
          - shared/test-architecture

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./services/auth-service/gradlew

      - name: Run checks for ${{ matrix.project }}
        run: ./services/auth-service/gradlew -p ./${{ matrix.project }} check

  genai-tests:
    name: Check genai-service
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/genai-service/pyproject.toml

      - name: Install genai-service with dev deps
        working-directory: ./services/genai-service
        run: pip install -e '.[dev]'

      - name: Lint with ruff
        working-directory: ./services/genai-service
        run: ruff check

      - name: Run unit + contract tests
        working-directory: ./services/genai-service
        run: pytest -v

  prometheus-rules-tests:
    name: Test Prometheus alert rules
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run promtool test rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "$PWD/infra/prometheus:/etc/prometheus" \
            prom/prometheus:v2.55.1 \
            test rules /etc/prometheus/alerts_test.yml

  iac-scan:
    name: IaC security scan (trivy)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Scan the chart as it actually deploys (AET values), not the raw
      # templates — infra/helm is skip-dir'ed below so findings aren't
      # double-reported against the unrendered templates.
      - name: Render Helm chart with production (AET) values
        run: |
          mkdir -p rendered-manifests
          helm template foundflow infra/helm/foundflow \
            -f infra/helm/foundflow/values-aet.yaml \
            > rendered-manifests/foundflow.yaml

      - name: Scan Dockerfiles, Terraform, compose + rendered manifests
        uses: aquasecurity/trivy-action@v0.36.0
        # Non-blocking until the deferred findings in .trivyignore.yaml are
        # burned down (#289, #290) — then drop continue-on-error.
        continue-on-error: true
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          skip-dirs: infra/helm
          trivyignores: .trivyignore.yaml

  client-build:
    name: Build client
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint client
        working-directory: ./client
        run: npm run lint

      - name: Build client
        working-directory: ./client
        run: npm run build

  client-tests:
    name: Test client
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Vitest with coverage
        working-directory: ./client
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: client/coverage

  public-report-client-build:
    name: Build public-report-client
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: public-report-client/package-lock.json

      - name: Install dependencies
        working-directory: ./public-report-client
        run: npm ci

      - name: Lint public-report-client
        working-directory: ./public-report-client
        run: npm run lint

      - name: Build public-report-client
        working-directory: ./public-report-client
        run: npm run build

  public-report-client-tests:
    name: Test public-report-client
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: public-report-client/package-lock.json

      - name: Install dependencies
        working-directory: ./public-report-client
        run: npm ci

      - name: Run Vitest with coverage
        working-directory: ./public-report-client
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-report-client-coverage
          path: public-report-client/coverage

  codegen-check:
    name: Verify Orval clients match committed specs
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            public-report-client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Regenerate client from committed specs
        working-directory: ./client
        run: npm run codegen

      - name: Install public-report-client dependencies
        working-directory: ./public-report-client
        run: npm ci

      - name: Regenerate public-report-client from committed specs
        working-directory: ./public-report-client
        run: npm run codegen

      - name: Fail if any generated client drifted
        run: git diff --exit-code client/src/api public-report-client/src/api

  e2e-tests:
    name: Run Docker Compose E2E flow
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs:
      - backend-tests
      - client-build
      - client-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare CI environment file
        run: |
          cp .env.example .env
          # Use the deterministic 'fake' GenAI provider in CI so the
          # extraction wiring (issue #128) can be exercised without
          # pulling multi-GB Ollama models or a real OpenAI key.
          echo "GENAI_PROVIDER=fake" >> .env
          # The E2E suite manages its own venues/items; keep demo seeding off
          # so it doesn't perturb counts/listing assertions.
          echo "SEED_DEMO_DATA=false" >> .env

      - name: Build and start backend stack
        run: |
          # genai-service has no depends_on (it reaches Ollama by URL, and
          # Ollama is profile-gated), so start it on its own with --no-deps.
          docker compose up --build -d --no-deps genai-service

          # Backend services declare their datastores (db + minio/rabbitmq,
          # condition: service_healthy) via depends_on, so let compose resolve
          # and health-gate them rather than hand-listing every dependency.
          docker compose up --build -d \
            auth-service \
            lost-item-service \
            found-item-service \
            matching-service \
            pickup-service \
            notification-service \
            operations-service

          # gateway-service depends_on the backends; bring it up last.
          docker compose up --build -d gateway-service

      - name: Show running containers
        run: docker compose ps

      - name: Wait for backend services
        shell: bash
        run: |
          set -euo pipefail

          services=(
            "gateway-service|http://localhost:8080/actuator/health"
            "auth-service|http://localhost:8080/auth/actuator/health"
            "lost-item-service|http://localhost:8080/lost-items/actuator/health"
            "found-item-service|http://localhost:8080/found-items/actuator/health"
            "matching-service|http://localhost:8080/matches/actuator/health"
            "pickup-service|http://localhost:8080/pickups/actuator/health"
            "notification-service|http://localhost:8080/notifications/actuator/health"
            "operations-service|http://localhost:8080/venues/actuator/health"
            "genai-service|http://localhost:8000/health"
          )

          check_service() {
            local name="$1"
            local url="$2"

            echo "Waiting for $name at $url..."

            for i in {1..60}; do
              if curl --fail --silent --show-error "$url" > /dev/null; then
                echo "$name is reachable."
                return 0
              fi

              sleep 5
            done

            echo "$name did not become reachable in time."
            return 1
          }

          pids=()

          for entry in "${services[@]}"; do
            name="${entry%%|*}"
            url="${entry#*|}"

            check_service "$name" "$url" &
            pids+=($!)
          done

          failed=0

          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              failed=1
            fi
          done

          exit "$failed"

      - name: Run E2E test suite
        shell: pwsh
        run: ./tests/e2e/foundflow-e2e.ps1

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: docker compose down -v --remove-orphans
