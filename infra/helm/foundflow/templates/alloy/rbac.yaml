{{/*
Alloy tails pod logs through the Kubernetes API (loki.source.kubernetes), not
from node log files — we can't run a DaemonSet with hostPath on the shared AET
cluster. That needs read access to pods and pods/log in our namespace only,
so a namespaced Role is sufficient.
*/}}
{{- if .Values.alloy.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: alloy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: alloy
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: {{ .Values.namespace.name }}
{{- end }}
