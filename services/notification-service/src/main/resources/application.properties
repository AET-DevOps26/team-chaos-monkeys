spring.application.name=notification-service
server.port=${SERVER_PORT:8085}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus,info
# spring-boot-starter-mail auto-registers a MailHealthIndicator that probes
# the SMTP server on every /actuator/health call. CI runs without Brevo
# credentials by design, so the indicator would keep the service in 503 and
# block the e2e health-gate. Liveness for this service is "consumer thread +
# DB up", which the default indicators already cover.
management.health.mail.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}

foundflow.public.base-url=${PUBLIC_BASE_URL:http://localhost:8080}
foundflow.magic-link.secret=${MAGIC_LINK_SECRET:foundflow-local-dev-magic-link-secret-change-me}
foundflow.magic-link.ttl-days=${MAGIC_LINK_TTL_DAYS:7}

# Brevo SMTP (or any provider). Without credentials, SMTP sends fail but the
# notifications row remains persisted so /api/notifications keeps magic links
# visible in local/dev/e2e environments.
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

foundflow.notifications.from-address=${FOUNDFLOW_MAIL_FROM:no-reply@foundflow.app}
