# Loki in single-binary ("monolithic") mode with filesystem storage — right-sized
# for course traffic, same judgment as running single-replica Postgres. Shared by
# docker-compose (bind mount) and Helm (ConfigMap); keep it env-agnostic.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# 7-day retention keeps the volume bounded; the compactor is what actually
# deletes expired chunks (retention_period alone does nothing without it).
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

limits_config:
  retention_period: 168h

analytics:
  reporting_enabled: false
