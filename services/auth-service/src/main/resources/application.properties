spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# Comma-separated list of origins allowed to reach this service via the
# browser. Override with APP_CORS_ALLOWED_ORIGINS env var. The default
# covers the canonical client port (3000) — extend it for any host port
# you publish the client on locally (see docker-compose.override.yml.example).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
