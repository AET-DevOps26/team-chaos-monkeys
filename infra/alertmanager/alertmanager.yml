# Local/CI alert delivery (issue #282): route everything to mailpit's SMTP
# sink, so a firing alert shows up as an email in the mailpit UI (:8025).
# Zero external secrets — mailpit accepts unauthenticated SMTP.
route:
  receiver: team-mail
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: team-mail
    email_configs:
      - to: alerts@foundflow.local
        from: prometheus@foundflow.local
        smarthost: mailpit:1025
        require_tls: false
