name: Azure cycle (ephemeral VM)

on:
  workflow_dispatch:
    inputs:
      action:
        description: apply (provision + deploy) or destroy
        type: choice
        options: [apply, destroy]
        required: true
        default: apply
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest

permissions:
  contents: read

concurrency:
  group: azure-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Write SSH public key for Terraform
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -y -f <(printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}") > ~/.ssh/tum_devops_azure.pub
          chmod 644 ~/.ssh/tum_devops_azure.pub

      - name: Terraform init
        working-directory: deploy/terraform
        run: terraform init -input=false

      - name: Terraform destroy
        if: ${{ inputs.action == 'destroy' }}
        working-directory: deploy/terraform
        run: terraform destroy -auto-approve -input=false -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' }}
        working-directory: deploy/terraform
        run: terraform apply -auto-approve -input=false -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Capture public IP
        if: ${{ inputs.action == 'apply' }}
        id: tf
        working-directory: deploy/terraform
        run: echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"

      - name: Install Ansible
        if: ${{ inputs.action == 'apply' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ansible
          ansible-galaxy collection install community.docker ansible.posix

      - name: Write SSH private key
        if: ${{ inputs.action == 'apply' }}
        run: |
          install -m 600 /dev/null ~/.ssh/id_rsa
          printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/id_rsa

      - name: Run playbook
        if: ${{ inputs.action == 'apply' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          BREVO_SMTP_USERNAME: ${{ secrets.BREVO_SMTP_USERNAME }}
          BREVO_SMTP_PASSWORD: ${{ secrets.BREVO_SMTP_PASSWORD }}
          BREVO_MAIL_FROM: ${{ secrets.BREVO_MAIL_FROM }}
          BREVO_TEST_RECIPIENT: ${{ secrets.BREVO_TEST_RECIPIENT }}
          PUBLIC_IP: ${{ steps.tf.outputs.public_ip }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        working-directory: deploy/ansible
        run: |
          set -euo pipefail
          deploy_vars="$(mktemp)"
          trap 'rm -f "$deploy_vars"' EXIT
          jq -n \
            --arg openai_api_key "$OPENAI_API_KEY" \
            --arg brevo_smtp_username "$BREVO_SMTP_USERNAME" \
            --arg brevo_smtp_password "$BREVO_SMTP_PASSWORD" \
            --arg brevo_mail_from "$BREVO_MAIL_FROM" \
            --arg brevo_test_recipient "$BREVO_TEST_RECIPIENT" \
            --arg public_base_url "http://$PUBLIC_IP" \
            --arg image_tag "$IMAGE_TAG" \
            '{
              openai_api_key: $openai_api_key,
              brevo_smtp_username: $brevo_smtp_username,
              brevo_smtp_password: $brevo_smtp_password,
              brevo_mail_from: $brevo_mail_from,
              brevo_test_recipient: $brevo_test_recipient,
              public_base_url: $public_base_url,
              image_tag: $image_tag
            }' > "$deploy_vars"
          chmod 600 "$deploy_vars"

          ansible-playbook \
            -i "$PUBLIC_IP," \
            --user azureuser \
            --private-key ~/.ssh/id_rsa \
            deploy.yml \
            --extra-vars "@$deploy_vars"

      - name: Summarise
        if: ${{ inputs.action == 'apply' && success() }}
        env:
          PUBLIC_IP: ${{ steps.tf.outputs.public_ip }}
        run: |
          IP="$PUBLIC_IP"
          {
            echo "### Azure VM deployed"
            echo
            echo "- IP: \`$IP\`"
            echo "- Frontend: http://$IP/"
            echo "- Gateway health: http://$IP/api/actuator/health"
            echo
            echo "Don't forget to **destroy** when finished (re-run with \`action: destroy\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarise (destroy)
        if: ${{ inputs.action == 'destroy' && success() }}
        run: |
          {
            echo "### Azure VM destroyed"
            echo
            echo "Resources removed via \`terraform destroy\`. tfstate backend retained for next cycle."
          } >> "$GITHUB_STEP_SUMMARY"
