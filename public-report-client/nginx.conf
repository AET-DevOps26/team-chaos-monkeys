server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # No /api proxy here: the edge (compose) / ingress (k8s) owns /api and routes
    # it to the gateway. This container only serves the static bundle.

    # Bare /report → canonical /report/.
    location = /report {
        return 301 /report/;
    }

    # Vite content-hashes asset filenames, so they can be cached forever.
    location /report/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The bundle lives under /report (Vite base '/report/'). SPA fallback so
    # client-side routes like /report/confirmation resolve on hard refresh.
    # index.html is the mutable pointer to the hashed assets — never cache it.
    location /report/ {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /report/index.html;
    }
}
