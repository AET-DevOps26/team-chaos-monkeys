{{- if .Values.alloy.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: alloy
    app.kubernetes.io/component: alloy
spec:
  replicas: 1
  # Recreate: no surge pod against the tight AET namespace quota, and two
  # concurrent Alloys would double-ship every log line.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "foundflow.labels" . | nindent 8 }}
        app.kubernetes.io/name: alloy
        app.kubernetes.io/component: alloy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/alloy/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: {{ .Values.alloy.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http
              containerPort: 12345
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: storage
              mountPath: /var/lib/alloy/data
          {{- with .Values.alloy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: foundflow-alloy-config
        - name: storage
          emptyDir: {}
{{- end }}
