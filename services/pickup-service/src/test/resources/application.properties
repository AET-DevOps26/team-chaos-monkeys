spring.datasource.url=jdbc:h2:mem:pickup_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.sql.init.mode=never

spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

foundflow.public.base-url=http://localhost:8080
foundflow.magic-link.secret=test-secret-with-enough-length
foundflow.magic-link.ttl-days=7
