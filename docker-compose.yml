services:
  auth-service:
    build:
      context: ./services/auth-service
    container_name: foundflow-auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081

  lost-item-service:
    build:
      context: ./services/lost-item-service
    container_name: foundflow-lost-item-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082

  found-item-service:
    build:
      context: ./services/found-item-service
    container_name: foundflow-found-item-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083

  matching-service:
    build:
      context: ./services/matching-service
    container_name: foundflow-matching-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084

  notification-service:
    build:
      context: ./services/notification-service
    container_name: foundflow-notification-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085

  operations-service:
    build:
      context: ./services/operations-service
    container_name: foundflow-operations-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086

  genai-service:
    build:
      context: ./services/genai-service
    container_name: foundflow-genai-service
    ports:
      - "8087:8000"

  client:
    build:
      context: ./client
    container_name: foundflow-client
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - lost-item-service
      - found-item-service
      - matching-service
      - notification-service
      - operations-service
      - genai-service