server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # No /api proxy here: the edge (compose) / ingress (k8s) owns /api and routes
    # it to the gateway. This container only serves the static admin bundle.

    # SPA fallback so client-side routes resolve on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
