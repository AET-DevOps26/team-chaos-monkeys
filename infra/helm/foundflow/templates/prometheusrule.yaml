{{/*
Source of truth for these alerts: infra/prometheus/alerts.yml (consumed by the
docker-compose Prometheus). Keep this template in sync when alerts change.
A future improvement is to load the YAML via .Files.Get and embed it, but the
copy is fine while the rule set is small.
*/}}
{{- if .Values.monitoring.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: foundflow-alerts
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "foundflow.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.prometheusReleaseLabel | quote }}
spec:
  groups:
    - name: foundflow-availability
      rules:
        - alert: ServiceDown
          expr: up{namespace="{{ .Values.namespace.name }}"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "{{ "{{" }} $labels.job {{ "}}" }} is down"
            description: "Prometheus has not been able to scrape {{ "{{" }} $labels.job {{ "}}" }} for 1 minute."

        - alert: HighErrorRate
          expr: |
            sum by (job) (rate(http_server_requests_seconds_count{outcome="SERVER_ERROR",namespace="{{ .Values.namespace.name }}"}[5m]))
              /
            sum by (job) (rate(http_server_requests_seconds_count{namespace="{{ .Values.namespace.name }}"}[5m]))
              > 0.01
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ "{{" }} $labels.job {{ "}}" }}: server error rate > 1%"
            description: "5xx rate has exceeded 1% over the last 5 minutes."

    - name: foundflow-genai
      rules:
        - alert: GenAIProviderFailureRate
          expr: |
            sum by (provider, endpoint) (
              rate(genai_provider_requests_total{outcome!="ok",namespace="{{ .Values.namespace.name }}"}[5m])
            )
              /
            sum by (provider, endpoint) (
              rate(genai_provider_requests_total{namespace="{{ .Values.namespace.name }}"}[5m])
            )
              > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GenAI provider {{ "{{" }} $labels.provider {{ "}}" }} failing on {{ "{{" }} $labels.endpoint {{ "}}" }}"
            description: "Non-ok provider outcomes exceed 5% of calls over the last 5 minutes."

        - alert: GenAIProviderSlow
          expr: |
            histogram_quantile(
              0.95,
              sum by (provider, endpoint, le) (
                rate(genai_provider_request_duration_seconds_bucket{namespace="{{ .Values.namespace.name }}"}[5m])
              )
            ) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "GenAI provider {{ "{{" }} $labels.provider {{ "}}" }} slow on {{ "{{" }} $labels.endpoint {{ "}}" }}"
            description: "p95 provider-call latency > 5s over the last 10 minutes."

        - alert: GenAIValidationErrorSpike
          expr: |
            sum by (endpoint) (
              rate(genai_validation_errors_total{namespace="{{ .Values.namespace.name }}"}[5m])
            )
              /
            sum by (endpoint) (
              rate(genai_provider_requests_total{outcome="ok",namespace="{{ .Values.namespace.name }}"}[5m])
            )
              > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Model output failing validation on {{ "{{" }} $labels.endpoint {{ "}}" }}"
            description: "Validation failures exceed 10% of successful provider calls over the last 5 minutes."
{{- end }}
