# =============================================================================
# values.yaml — chart-wide defaults
# =============================================================================
# This is the base layer. Every install reads it; the env-specific files
# merge on top:
#   - values-local.yaml         → local Kubernetes (Docker Desktop / OrbStack)
#   - values-local.yaml.local   → gitignored, per-developer secrets (optional)
#   - values-aet.yaml           → AET production cluster (used by CD)
#
# Defaults here target the AET cluster shape (TLS via cert-manager, csi-rbd-sc
# storage, GHCR images). Local installs override what doesn't apply.
#
# IMPORTANT: service keys MUST exactly equal docker-compose service names. Gateway
# routes (services/gateway-service/src/main/resources/application.yml) hardcode
# URIs like http://auth-service:8081 — the Kubernetes Service objects we create
# get the same names so service-to-service calls work identically in compose,
# local k8s, and AET. Don't rename a service key without also updating gateway
# routes.

global:
  imageRegistry: ghcr.io/aet-devops26/team-chaos-monkeys
  imageTag: latest
  imagePullPolicy: IfNotPresent
  storageClassName: csi-rbd-sc

namespace:
  # Team Chaos Monkeys deploys exclusively into this namespace.
  # Locally we mirror the same name to minimise drift.
  name: team-chaos-monkeys
  create: false

ingress:
  enabled: true
  className: nginx
  host: team-chaos-monkeys.stud.k8s.aet.cit.tum.de
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
    secretName: foundflow-tls
  annotations: {}

# Per-app config consumed by the _app library template.
# kind: spring | python | static — controls default probe/metrics paths.
# imageName: container image name (relative to global.imageRegistry). Defaults to the key.
services:
  gateway-service:
    kind: spring
    port: 8080
    metrics: true
    public: true
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8080" }

  auth-service:
    kind: spring
    port: 8081
    metrics: true
    dbRef: auth-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8081" }
      - { name: SPRING_PROFILES_ACTIVE, value: "dev" }
      # auth-service starts an AMQP listener; the k8s broker has no default
      # `guest` user (unlike compose), so it needs the foundflow credentials.
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
    secretEnv:
      - { name: DEV_ADMIN_EMAIL,    secret: foundflow-app-secrets, key: devAdminEmail }
      - { name: DEV_ADMIN_PASSWORD, secret: foundflow-app-secrets, key: devAdminPassword }
      - { name: JWT_RSA_PRIVATE_KEY, secret: foundflow-app-secrets, key: jwtRsaPrivateKey, optional: true }
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq, key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq, key: password }

  lost-item-service:
    kind: spring
    port: 8082
    metrics: true
    dbRef: lost-item-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8082" }
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
      - { name: PHOTO_STORAGE_PROVIDER, value: "minio" }
      - { name: PHOTO_STORAGE_ENDPOINT, value: "http://minio:9000" }
      - { name: PHOTO_STORAGE_PUBLIC_ENDPOINT, value: "http://minio:9000" }
      - { name: PHOTO_STORAGE_BUCKET, value: "foundflow-lost-photos" }
      # GenAI extraction wiring (issue #128). Failures are best-effort and
      # never block intake; see AttributeExtractionService.
      - { name: GENAI_BASE_URL, value: "http://genai-service:8000" }
      - { name: GENAI_ENABLED,  value: "true" }
      - { name: EMBEDDING_DIMENSIONS, value: "768" }
      - { name: MATCHING_AUTO_INVITE_THRESHOLD, value: "0.85" }
      - { name: MATCHING_REPUBLISH_SCORE_DELTA, value: "0.01" }
    secretEnv:
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq, key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq, key: password }
      - { name: PHOTO_STORAGE_ACCESS_KEY, secret: foundflow-minio, key: accessKey }
      - { name: PHOTO_STORAGE_SECRET_KEY, secret: foundflow-minio, key: secretKey }
      - { name: GENAI_API_KEY, secret: foundflow-app-secrets, key: genaiInternalToken, optional: true }

  found-item-service:
    kind: spring
    port: 8083
    metrics: true
    dbRef: found-item-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8083" }
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
      - { name: PHOTO_STORAGE_PROVIDER, value: "minio" }
      - { name: PHOTO_STORAGE_ENDPOINT, value: "http://minio:9000" }
      - { name: PHOTO_STORAGE_PUBLIC_ENDPOINT, value: "http://minio:9000" }
      - { name: PHOTO_STORAGE_BUCKET, value: "foundflow-found-photos" }
      - { name: GENAI_BASE_URL, value: "http://genai-service:8000" }
      - { name: GENAI_ENABLED,  value: "true" }
    secretEnv:
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq, key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq, key: password }
      - { name: PHOTO_STORAGE_ACCESS_KEY, secret: foundflow-minio, key: accessKey }
      - { name: PHOTO_STORAGE_SECRET_KEY, secret: foundflow-minio, key: secretKey }
      - { name: INTERNAL_SERVICE_TOKEN, secret: foundflow-app-secrets, key: internalServiceToken }
      - { name: GENAI_API_KEY, secret: foundflow-app-secrets, key: genaiInternalToken, optional: true }

  matching-service:
    kind: spring
    port: 8084
    metrics: true
    dbRef: matching-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8084" }
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
      - { name: EMBEDDING_DIMENSIONS, value: "768" }
      - { name: GENAI_BASE_URL, value: "http://genai-service:8000" }
      - { name: GENAI_ENABLED,  value: "true" }
    secretEnv:
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq, key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq, key: password }
      - { name: INTERNAL_SERVICE_TOKEN, secret: foundflow-app-secrets, key: internalServiceToken }
      - { name: GENAI_API_KEY, secret: foundflow-app-secrets, key: genaiInternalToken, optional: true }

  notification-service:
    kind: spring
    port: 8085
    metrics: true
    dbRef: notification-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8085" }
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
      - { name: SPRING_MAIL_HOST, value: "smtp-relay.brevo.com" }
      - { name: SPRING_MAIL_PORT, value: "587" }
      - { name: SPRING_MAIL_SMTP_AUTH, value: "true" }
      - { name: SPRING_MAIL_SMTP_STARTTLS, value: "true" }
    secretEnv:
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq,    key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq,    key: password }
      - { name: MAGIC_LINK_SECRET,        secret: foundflow-app-secrets, key: magicLinkSecret,       optional: true }
      - { name: SPRING_MAIL_USERNAME,     secret: foundflow-app-secrets, key: brevoSmtpUsername,     optional: true }
      - { name: SPRING_MAIL_PASSWORD,     secret: foundflow-app-secrets, key: brevoSmtpPassword,     optional: true }
      - { name: FOUNDFLOW_MAIL_FROM,      secret: foundflow-app-secrets, key: brevoMailFromAddress,  optional: true }

  operations-service:
    kind: spring
    port: 8086
    metrics: true
    dbRef: operations-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8086" }
      # Seed the fixed demo venue so /report/grand-plaza-hotel-demo and the
      # demo staff login work on k8s exactly as documented in the README.
      - { name: SEED_DEMO_DATA, value: "true" }
      # operations-service opens an AMQP connection; without a host it defaults
      # to localhost. Point it at the broker with the foundflow credentials.
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
    secretEnv:
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq, key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq, key: password }

  pickup-service:
    kind: spring
    port: 8087
    metrics: true
    dbRef: pickup-db
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 416Mi }
    env:
      - { name: SERVER_PORT, value: "8087" }
      # Seed evergreen demo pickup schedules for the fixed demo venue so the
      # match → confirm → book-a-slot flow has bookable slots out of the box.
      - { name: SEED_DEMO_DATA, value: "true" }
      # All Spring services share the AMQP autoconfig and open a broker
      # connection at startup; give pickup the same host + credentials.
      - { name: SPRING_RABBITMQ_HOST, value: "rabbitmq" }
      - { name: SPRING_RABBITMQ_PORT, value: "5672" }
    secretEnv:
      - { name: MAGIC_LINK_SECRET, secret: foundflow-app-secrets, key: magicLinkSecret, optional: true }
      - { name: SPRING_RABBITMQ_USERNAME, secret: foundflow-rabbitmq, key: username }
      - { name: SPRING_RABBITMQ_PASSWORD, secret: foundflow-rabbitmq, key: password }

  genai-service:
    kind: python
    port: 8000
    metrics: true
    metricsPath: /metrics
    healthPath: /health
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 200m, memory: 256Mi }
    env:
      - { name: LOG_FORMAT, value: "json" }
      - { name: GENAI_PROVIDER, value: openai }
      - { name: OPENAI_CHAT_MODEL,  value: "gpt-4o-mini" }
      - { name: OPENAI_EMBED_MODEL, value: "text-embedding-3-small" }
      - { name: GENAI_TIMEOUT_SECONDS, value: "30" }
      - { name: EMBEDDING_DIMENSIONS, value: "768" }
    secretEnv:
      - { name: OPENAI_API_KEY, secret: foundflow-app-secrets, key: openaiApiKey, optional: true }

  client:
    kind: static
    port: 80          # nginx in the client image listens on 80
    metrics: false
    public: true
    replicas: 1
    resources:
      requests: { cpu: 25m, memory: 32Mi }
      limits:   { cpu: 50m, memory: 64Mi }

  # Unauthenticated guest report SPA, routed by the ingress at /report.
  public-report-client:
    kind: static
    port: 80          # nginx in the image listens on 80
    # nginx serves the bundle only under /report/ (Vite base), nothing at '/',
    # so the static-default probe path of '/' would 404 and the pod never goes
    # Ready. Probe the served prefix instead.
    healthPath: /report/
    metrics: false
    public: true
    replicas: 1
    resources:
      requests: { cpu: 25m, memory: 32Mi }
      limits:   { cpu: 50m, memory: 64Mi }

# One in-namespace Postgres instance per Spring service. Each gets:
#   - StatefulSet with one replica (postgres:17, same image as docker-compose)
#   - PVC of the requested size on global.storageClassName
#   - Headless ClusterIP Service named exactly as the key (so `auth-db:5432` works)
#   - Secret <key> with key `password` (random on first install, stable after)
# initScript is rendered into the StatefulSet's POSTGRES_INITDB_ARGS path as a
# pre-init SQL file. Used by matching-db to enable pgvector.
databases:
  auth-db:        { username: auth,         database: authdb,         storageSize: 1Gi }
  lost-item-db:   { username: lostitem,     database: lostitemdb,     storageSize: 1Gi }
  found-item-db:  { username: founditem,    database: founditemdb,    storageSize: 1Gi }
  matching-db:
    username: matching
    database: matchingdb
    storageSize: 2Gi
    image: pgvector/pgvector:pg17    # bundles pgvector extension
    initScript: |
      CREATE EXTENSION IF NOT EXISTS vector;
  notification-db: { username: notification, database: notificationdb, storageSize: 1Gi }
  operations-db:  { username: operations,   database: operationsdb,   storageSize: 1Gi }
  pickup-db:      { username: pickup,        database: pickupdb,        storageSize: 1Gi }

postgresDefaults:
  image: postgres:17
  resources:
    requests: { cpu: 50m,  memory: 96Mi }
    limits:   { cpu: 75m,  memory: 128Mi }

# In-namespace RabbitMQ broker. Service name "rabbitmq" matches docker-compose so
# Spring services consume the same SPRING_RABBITMQ_HOST=rabbitmq value in
# compose, local k8s, and AET. Credentials live in the foundflow-rabbitmq
# Secret: a literal `password` here is used as-is; if left empty, a random
# password is generated on first install and held stable via lookup() (same
# pattern as templates/databases.yaml).
# Plain rabbitmq:4.0 (no management plugin): the web UI is local-debug only and
# internal-only in AET, and it is NOT our metrics source (those would come from
# rabbitmq_prometheus). Dropping it saves ~80-120Mi so the broker fits 384Mi
# inside the tight AET namespace quota (4 CPU / 6Gi). Compose keeps -management
# for the local UI. disk_free_limit + memory watermark are set in rabbitmq.yaml.
rabbitmq:
  enabled: true
  image: rabbitmq:4.0
  username: foundflow
  password: ""
  resources:
    requests: { cpu: 50m,  memory: 256Mi }
    limits:   { cpu: 200m, memory: 384Mi }
  # Persistence is off by default: RabbitMQ here carries transient domain events
  # only — losing the queue contents on pod restart is acceptable. Flip to true
  # and set storageSize for broker data survivability. Durable queues already
  # exist; clean up old queues explicitly when durable queue names change.
  persistence:
    enabled: false
    storageSize: 1Gi

# In-namespace MinIO for photo storage. Service "minio" exposes the S3 API on
# 9000 and the console on 9001 (cluster-internal only; not on the ingress).
# shared/photo-storage's MinioPhotoStorage calls ensureBucketExists() on
# startup, so the chart does not need a bucket-bootstrap Job — lost-item and
# found-item services create their own buckets on first use.
minio:
  enabled: true
  image: minio/minio:RELEASE.2025-04-22T22-12-26Z
  accessKey: foundflow
  secretKey: ""    # generated and held stable via lookup() when empty
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 100m, memory: 256Mi }
  persistence:
    storageSize: 5Gi

# Application Secret (foundflow-app-secrets). Values populated at install time:
#   helm upgrade --install foundflow ./infra/helm/foundflow \
#     --set secrets.openaiApiKey=$OPENAI_API_KEY ...
# Or supplied via a gitignored values-local.yaml.local file.
secrets:
  openaiApiKey: ""
  devAdminEmail: ""
  devAdminPassword: ""
  jwtRsaPrivateKey: ""
  # Shared service-to-service token used by matching-service to call
  # found-item-service internal endpoints. Required for those services to start.
  internalServiceToken: ""
  # Magic-link HMAC signing secret. When empty the app falls back to the dev
  # default baked into application.properties — fine for demo, never for prod.
  magicLinkSecret: ""
  # Brevo SMTP credentials for notification-service. When empty the consumer
  # still persists notifications rows (with the magic-link URL in body) but
  # every SMTP attempt fails and is dropped after the bounded retry; the
  # notifications_send_failures_total counter tracks the drops.
  brevoSmtpUsername: ""
  brevoSmtpPassword: ""
  # Optional From: header override. When empty, notification-service falls back
  # to the `foundflow.notifications.from-address` default in application.properties.
  brevoMailFromAddress: ""

grafana:
  enabled: true
  image: grafana/grafana:11.3.0
  adminUser: admin
  adminPassword: ""   # if empty, admin is generated into a Secret as password
  # Prometheus the Grafana datasource talks to. In-cluster, this is the
  # operator-managed Prometheus shipped by kube-prometheus-stack.
  prometheusUrl: http://prometheus-operated.monitoring.svc.cluster.local:9090
  ingressPath: /grafana
  resources:
    requests: { cpu: 50m, memory: 96Mi }
    limits:   { cpu: 75m, memory: 192Mi }

# Log aggregation (issue #277): Loki + Alloy, self-deployed by this chart the
# same way Grafana is — neither Rancher Monitoring (AET) nor kube-prometheus-stack
# (local) ships them. Config is shared verbatim with docker-compose via
# files/loki-config.yaml (symlink to infra/loki/loki-config.yaml).
#
# AET quota budget (the namespace ResourceQuota binds LIMITS: 4 CPU / 6Gi).
# Loki+Alloy (+Tempo, #279) were funded by trimming limits where `kubectl top`
# showed real headroom (2026-07-03): genai 69Mi used of 384Mi, each Postgres
# ~40Mi of 160Mi, Grafana 61Mi of 192Mi. Spring went 448→416Mi only — their
# JVM heap tracks the limit (MaxRAMPercentage), so cuts there shrink heap, not
# waste. After Loki+Alloy: 3850m/4 CPU, 5824Mi/6Gi — leaving 150m/320Mi for
# Tempo. Tempo (#279) now takes exactly that: the limit quota is fully
# allocated (4000m/4 CPU, 6144Mi/6Gi) — anything new must be funded by a trim.
loki:
  enabled: true
  image: grafana/loki:3.4.1
  # Small PVC, not emptyDir: CD Recreates every pod on each merge to main, and
  # log history should survive a deploy. 7-day retention bounds the usage.
  storageSize: 2Gi
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 150m, memory: 256Mi }

# Log collector: single Deployment tailing our namespace's pod logs via the
# Kubernetes API (loki.source.kubernetes) — no DaemonSet/hostPath, which we
# can't run on the shared AET cluster.
alloy:
  enabled: true
  image: grafana/alloy:v1.8.3
  resources:
    requests: { cpu: 25m,  memory: 64Mi }
    limits:   { cpu: 100m, memory: 128Mi }

# Trace store (issue #279): Tempo single-binary, config shared verbatim with
# docker-compose via files/tempo-config.yaml (symlink to
# infra/tempo/tempo-config.yaml). Spring services push OTLP spans straight to
# tempo:4318 (no collector hop); Grafana queries tempo:3200.
tempo:
  enabled: true
  image: grafana/tempo:2.8.1
  # Small PVC, not emptyDir: trace history survives the Recreate-on-deploy
  # cycle. 7-day retention (in tempo-config.yaml) bounds the usage.
  storageSize: 2Gi
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 150m, memory: 320Mi }

# Toggles cluster-namespaced Prometheus Operator resources (ServiceMonitor / PrometheusRule).
# Disable if the cluster lacks the operator (vanilla minikube without it installed).
monitoring:
  enabled: true
  prometheusReleaseLabel: kube-prometheus-stack

# Alert delivery (issue #282): namespaced AlertmanagerConfig for the cluster's
# existing Alertmanager (Rancher Monitoring on AET) — no Alertmanager pod of
# our own. Email receiver reuses the Brevo SMTP secrets. Off by default;
# values-aet enables it.
alerting:
  enabled: false
  email:
    # Recipient; falls back to secrets.brevoMailFromAddress when empty.
    to: ""
